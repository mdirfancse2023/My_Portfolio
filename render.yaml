services:
  - type: web
    name: myportfolio
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

cronJobs:
  - name: keep-alive
    schedule: "*/14 * * * *"
    command: curl -fsS https://myportfolio-aout.onrender.com >/dev/null
