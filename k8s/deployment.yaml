apiVersion: apps/v1
kind: Deployment
metadata:
  name: myportfolio
  labels:
    app: myportfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myportfolio
  template:
    metadata:
      labels:
        app: myportfolio
    spec:
      containers:
        - name: myportfolio
          image: DOCKERHUB_USERNAME/myportfolio:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
